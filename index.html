<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Activité A2 : Ma Journée d'École</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap');

        :root {
            --primary-color: #4a6cfd;
            --primary-light: #eff3fe;
            --success-color: #27ae60;
            --success-light: #eaf7f0;
            --error-color: #e74c3c;
            --error-light: #fdedec;
            --grey-light: #f8fafc;
            --grey-medium: #e2e8f0;
            --grey-dark: #64748b;
            --text-color: #1e293b;
            --white: #ffffff;
            --border-radius: 12px;
            --shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1), 0 2px 4px -2px rgb(0 0 0 / 0.1);
        }

        body {
            font-family: 'Poppins', Arial, sans-serif;
            margin: 0;
            background-color: var(--grey-light);
            color: var(--text-color);
            line-height: 1.6;
        }

        .container {
            max-width: 900px;
            margin: 2rem auto;
            padding: 2rem;
            background-color: var(--white);
            border-radius: var(--border-radius);
            box-shadow: var(--shadow);
        }

        h1 {
            font-size: 1.8rem;
            margin: 0 0 1.5rem 0;
            display: flex;
            align-items: center;
            gap: 0.75rem;
            color: var(--primary-color);
        }

        .tabs {
            display: flex;
            gap: 0.5rem;
            border-bottom: 2px solid var(--grey-medium);
            margin-bottom: 2rem;
        }

        .tab {
            border: none;
            background: none;
            padding: 0.75rem 1.25rem;
            cursor: pointer;
            font-size: 0.95rem;
            font-weight: 600;
            color: var(--grey-dark);
            border-bottom: 3px solid transparent;
            transition: all 0.2s ease;
            margin-bottom: -2px;
        }

        .tab[aria-selected="true"] {
            color: var(--primary-color);
            border-bottom-color: var(--primary-color);
        }

        .panel {
            display: none;
            animation: fadeIn 0.3s ease-out;
        }

        .panel.active {
            display: block;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(5px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .instructions {
            background-color: var(--primary-light);
            padding: 1rem 1.25rem;
            border-radius: 8px;
            margin-bottom: 1.5rem;
            font-size: 0.9rem;
            border-left: 4px solid var(--primary-color);
        }

        .controls-bar {
            display: flex;
            gap: 0.75rem;
            align-items: center;
            flex-wrap: wrap;
            margin-bottom: 2rem;
            padding: 1rem;
            background-color: #f1f5f9;
            border-radius: var(--border-radius);
        }

        button {
            border: 1px solid var(--grey-medium);
            border-radius: 8px;
            padding: 0.6rem 1rem;
            font-weight: 600;
            cursor: pointer;
            font-size: 0.85rem;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            transition: all 0.2s;
            background-color: var(--white);
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        button.primary {
            background-color: var(--primary-color);
            color: var(--white);
            border-color: var(--primary-color);
        }

        .text-content {
            font-size: 1.2rem;
            line-height: 2.5;
            padding: 1rem;
            position: relative;
        }

        .sent {
            padding: 0.2rem 0;
            border-radius: 6px;
            transition: background 0.2s;
        }

        .sent.active {
            background-color: var(--primary-light);
        }

        .word {
            display: inline-block;
            border-radius: 4px;
            padding: 0 4px;
            cursor: pointer;
            transition: background 0.2s, color 0.2s;
        }

        .word:hover {
            background-color: var(--primary-color);
            color: white;
        }

        .word.highlight {
            background-color: var(--primary-color);
            color: white;
        }

        .tooltip {
            position: fixed;
            z-index: 9999;
            background: #1e293b;
            color: white;
            padding: 0.5rem 1rem;
            border-radius: 6px;
            font-size: 0.9rem;
            pointer-events: none;
            visibility: hidden;
            opacity: 0;
            transition: opacity 0.2s;
            direction: rtl;
            text-align: right;
            box-shadow: 0 10px 15px rgba(0,0,0,0.2);
            transform: translate(-50%, -100%);
            margin-top: -8px;
            white-space: nowrap;
        }

        .tooltip::after {
            content: "";
            position: absolute;
            top: 100%;
            left: 50%;
            margin-left: -6px;
            border-width: 6px;
            border-style: solid;
            border-color: #1e293b transparent transparent transparent;
        }

        .lexicon-pool {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
            margin: 1.5rem 0;
        }

        .chip {
            padding: 0.4rem 0.8rem;
            background: var(--white);
            border: 1px solid var(--grey-medium);
            border-radius: 20px;
            font-size: 0.85rem;
            cursor: pointer;
        }

        .cloze-input {
            border: none;
            border-bottom: 2px solid var(--grey-medium);
            width: 80px;
            text-align: center;
            font-size: 1rem;
            outline: none;
            background: transparent;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>🏫 Ma journée d'école</h1>

    <nav class="tabs">
        <button class="tab" data-panel="p1" aria-selected="true">🎧 1. Écouter</button>
        <button class="tab" data-panel="p2" aria-selected="false">🧐 2. Comprendre</button>
        <button class="tab" data-panel="p3" aria-selected="false">✍️ 3. Écrire</button>
    </nav>

    <section id="p1" class="panel active">
        <p class="instructions">
            <strong>Survolez un mot</strong> pour voir sa traduction.<br>
            <strong>Cliquez sur un mot</strong> pour l'écouter.
        </p>

        <div class="controls-bar">
            <button id="btnPlay" class="primary" disabled>▶️ Tout lire</button>
            <button id="btnPause" disabled>⏸️ Pause</button>
            <button id="btnResume" disabled>▶️ Reprendre</button>
            <button id="btnStop" disabled>⏹️ Stop</button>
            <input id="rate" type="range" min="0.5" max="1.5" step="0.1" value="0.9" style="width: 80px;">
        </div>

        <div id="text" class="text-content"></div>
    </section>

    <section id="p3" class="panel">
        <div class="controls-bar">
            <button id="checkCloze" class="primary">✔️ Vérifier</button>
            <button id="resetCloze">↺ Recommencer</button>
        </div>
        <div id="clozeArea" class="text-content"></div>
        <div id="lexicon" class="lexicon-pool"></div>
    </section>
</div>

<div id="tooltip" class="tooltip"></div>

<script>
document.addEventListener('DOMContentLoaded', () => {
    // Dictionnaire pour les traductions mot à mot
    const DICT = {
        "ce": "هذا", "matin": "صباح", "je": "أنا", "me": "نفسي", "lève": "أستيقظ", "à": "في", "sept": "سبعة", "heures": "ساعات", "et": "و", "prends": "أتناول", "mon": "لي / الخاص بي", "petit-déjeuner": "فطور", "avec": "مع", "ma": "لي", "famille": "عائلة",
        "ensuite": "بعد ذلك", "vais": "أذهب", "école": "مدرسة", "pied": "قدم", "frère": "أخ", "dans": "في", "première": "أولى", "heure": "ساعة", "nous": "نحن", "avons": "لدينا", "un": "واحد", "cours": "درس", "français": "فرنسي", "où": "حيث", "lisons": "نقرأ", "texte": "نص",
        "puis": "ثم", "mathématiques": "رياضيات", "faisons": "نقوم بـ", "des": "الـ (للجمع)", "exercices": "تمارين", "au": "على", "tableau": "سبورة", "midi": "ظهر", "mange": "آكل", "la": "الـ", "cantine": "مقصف", "mes": "زملائي", "camarades": "زملاء", "classe": "فصل",
        "après": "بعد", "le": "الـ", "repas": "وجبة", "allons": "نذهب", "cour": "ساحة", "pour": "لـ / من أجل", "jouer": "لعب", "discuter": "حديث", "après-midi": "بعد الظهر", "sport": "رياضة", "gymnase": "صالة رياضية", "histoire": "تاريخ",
        "enfin": "أخيراً", "rentre": "أعود", "maison": "منزل", "fais": "أفعل", "devoirs": "واجبات", "regarde": "أشاهد", "peu": "قليلاً", "télévision": "تلفاز"
    };

    const DATA = [
        { fr: "Ce matin, je me lève à sept heures et je prends mon petit-déjeuner avec ma famille.", gaps: ["lève", "famille"] },
        { fr: "Ensuite, je vais à l’école à pied avec mon frère.", gaps: ["école", "frère"] },
        { fr: "Dans la première heure, nous avons un cours de français où nous lisons un texte.", gaps: ["cours", "lisons"] },
        { fr: "Puis je vais en mathématiques, et nous faisons des exercices au tableau.", gaps: ["exercices", "tableau"] },
        { fr: "À midi, je mange à la cantine avec mes camarades de classe.", gaps: ["cantine", "camarades"] },
        { fr: "Après le repas, nous allons dans la cour pour jouer et discuter.", gaps: ["cour", "jouer"] },
        { fr: "L’après-midi, nous avons sport au gymnase et un cours d’histoire.", gaps: ["sport", "gymnase", "histoire"] },
        { fr: "Enfin, je rentre à la maison, je fais mes devoirs et je regarde un peu la télévision.", gaps: ["maison", "devoirs", "télévision"] }
    ];

    const tts = {
        synth: window.speechSynthesis,
        voice: null,
        init() {
            return new Promise((resolve) => {
                const load = () => {
                    const voices = this.synth.getVoices();
                    this.voice = voices.find(v => v.lang.startsWith('fr')) || voices[0];
                    if (this.voice) resolve(true);
                };
                load();
                if (this.synth.onvoiceschanged !== undefined) this.synth.onvoiceschanged = load;
                setTimeout(() => resolve(!!this.voice), 1000);
            });
        },
        speak(text, rate, onBoundary, onEnd) {
            this.synth.cancel();
            const u = new SpeechSynthesisUtterance(text);
            u.voice = this.voice;
            u.rate = rate;
            u.onboundary = onBoundary;
            u.onend = onEnd;
            this.synth.speak(u);
        }
    };

    const textEl = document.getElementById('text');
    const tooltip = document.getElementById('tooltip');
    const btnPlay = document.getElementById('btnPlay');
    const btnPause = document.getElementById('btnPause');
    const btnResume = document.getElementById('btnResume');
    const btnStop = document.getElementById('btnStop');

    let isPaused = false;
    let stopRequested = false;

    // Génération du texte interactif
    DATA.forEach((s, sIdx) => {
        const pSpan = document.createElement('span');
        pSpan.className = 'sent';
        pSpan.dataset.idx = sIdx;
        
        const words = s.fr.split(/(\s+)/);
        words.forEach(w => {
            const cleanW = w.trim().toLowerCase().replace(/[.,!?;:]/g, "");
            if (cleanW) {
                const b = document.createElement('span');
                b.className = 'word';
                b.textContent = w;
                
                // --- ÉVÉNEMENTS SUR CHAQUE MOT ---
                b.onmouseenter = () => {
                    const translation = DICT[cleanW] || "...";
                    tooltip.textContent = translation;
                    tooltip.style.visibility = "visible";
                    tooltip.style.opacity = 1;
                    
                    const rect = b.getBoundingClientRect();
                    tooltip.style.left = (rect.left + rect.width / 2) + "px";
                    tooltip.style.top = rect.top + "px";
                };

                b.onmouseleave = () => {
                    tooltip.style.opacity = 0;
                    tooltip.style.visibility = "hidden";
                };

                b.onclick = (e) => {
                    e.stopPropagation();
                    tts.speak(cleanW, parseFloat(document.getElementById('rate').value));
                };

                pSpan.appendChild(b);
            } else {
                pSpan.appendChild(document.createTextNode(w));
            }
        });
        textEl.appendChild(pSpan);
        textEl.appendChild(document.createTextNode(' '));
    });

    // Fonctions de lecture
    function clearHighlights() {
        document.querySelectorAll('.word').forEach(w => w.classList.remove('highlight'));
        document.querySelectorAll('.sent').forEach(s => s.classList.remove('active'));
    }

    function playSentence(idx) {
        if (idx >= DATA.length || stopRequested) {
            btnPlay.disabled = false;
            btnStop.disabled = true;
            clearHighlights();
            return;
        }
        clearHighlights();
        const sentEl = textEl.querySelector(`.sent[data-idx="${idx}"]`);
        sentEl.classList.add('active');

        tts.speak(DATA[idx].fr, parseFloat(document.getElementById('rate').value), (e) => {
            const words = sentEl.querySelectorAll('.word');
            let charCount = 0;
            words.forEach(w => {
                w.classList.remove('highlight');
                if (e.charIndex >= charCount && e.charIndex < charCount + w.textContent.length) {
                    w.classList.add('highlight');
                }
                charCount += w.textContent.length + 1;
            });
        }, () => {
            if (!isPaused) playSentence(idx + 1);
        });
    }

    btnPlay.onclick = () => { 
        stopRequested = false; 
        isPaused = false; 
        btnPlay.disabled = true; 
        btnPause.disabled = false;
        btnStop.disabled = false;
        playSentence(0); 
    };
    btnPause.onclick = () => { isPaused = true; tts.synth.pause(); btnPause.disabled = true; btnResume.disabled = false; };
    btnResume.onclick = () => { isPaused = false; tts.synth.resume(); btnResume.disabled = true; btnPause.disabled = false; };
    btnStop.onclick = () => { stopRequested = true; tts.synth.cancel(); btnPlay.disabled = false; btnPause.disabled = true; btnResume.disabled = true; btnStop.disabled = true; clearHighlights(); };

    // Gestion Tabs simple
    document.querySelectorAll('.tab').forEach(t => {
        t.onclick = () => {
            document.querySelectorAll('.tab').forEach(b => b.setAttribute('aria-selected', 'false'));
            document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
            t.setAttribute('aria-selected', 'true');
            document.getElementById(t.dataset.panel).classList.add('active');
            if(t.dataset.panel !== 'p1') tts.synth.cancel();
        };
    });

    // Initialisation Cloze
    function initCloze() {
        const area = document.getElementById('clozeArea');
        const lex = document.getElementById('lexicon');
        area.innerHTML = ""; lex.innerHTML = "";
        let gWords = [];
        DATA.forEach(s => {
            let html = s.fr;
            s.gaps.forEach(g => {
                html = html.replace(new RegExp(`\\b${g}\\b`, 'i'), `<input class="cloze-input" data-ans="${g}">`);
                gWords.push(g);
            });
            const p = document.createElement('p'); p.innerHTML = html; area.appendChild(p);
        });
        gWords.sort().forEach(w => {
            const c = document.createElement('span'); c.className = 'chip'; c.textContent = w;
            c.onclick = () => { if(document.activeElement.tagName === 'INPUT') document.activeElement.value = w; };
            lex.appendChild(c);
        });
    }

    document.getElementById('checkCloze').onclick = () => {
        document.querySelectorAll('.cloze-input').forEach(i => {
            const ok = i.value.trim().toLowerCase() === i.dataset.ans.toLowerCase();
            i.style.borderBottomColor = ok ? 'var(--success-color)' : 'var(--error-color)';
        });
    };
    document.getElementById('resetCloze').onclick = initCloze;

    tts.init().then(ok => { if(ok) btnPlay.disabled = false; });
    initCloze();
});
</script>
</body>
</html>
